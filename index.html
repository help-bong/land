<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>랜드로버</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "막은 고딕";
      }
      ul,
      li,
      ol {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      header {
        width: 1100px;
        height: 100px;
        margin: 0 auto;
        background-color: rgb(255, 255, 255);
      }
      #logo {
        float: left;
        width: 130px;
        height: 70px;
        margin: 10px 0 0 10px;
        background-color: rgb(255, 255, 255);
      }
      #logo > img {
        width: 100%;
        height: 100%;
      }
      nav {
        width: 740px;
        height: 30px;
        float: right;
        background-color: rgb(255, 255, 255);
        margin: 30px 30px 0 0px;
      }
      nav ul {
        font-family: "Arial";
        font-weight: bold;
      }
      nav ul li {
        float: left;
        padding: 0 20px;
      }
      nav ul li a {
        text-decoration: none;
        color: #333;
      }
      nav ul a:hover {
        color: green;
      }
      #slider {
        width: 1100px;
        height: 450px;
        margin: 0 auto;
        background-color: rgb(246, 246, 246);
      }
      section {
        width: 1100px;
        height: 280px;
        margin: 0 auto;
        background-color: rgb(255, 255, 255);
      }
      article {
        float: left;
        width: 340px;
        height: 145px;
        margin: 30px 10px;
        background-color: rgb(255, 255, 255);
      }
      article h3 {
        margin: 0;
        font-size: 16px;
        height: 30px;
        width: 100%;
      }
      article img {
        float: left;
        margin: 0 10px 0 0px;
      }
      article h4 {
        margin: 0;
        font-size: 14px;
        height: 30px;
      }
      article p {
        font-family: "돋움";
        font-size: 12px;
        color: #666;
      }
      article .icon {
        width: 100px;
        height: 75px;
        float: left;
        margin: 0 0 0 5px;
        background-color: white;
        text-align: center;
      }
      article .icon img {
        float: left;
        margin: 0 0 0 20px;
      }
      article .icon span {
        width: 100%;
        text-align: center;
        float: left;
        font-size: 12px;
        margin: 10px 0 0 0px;
        display: block;
      }
      footer {
        width: 1100px;
        height: 100px;
        margin: 0 auto;
        background-color: #eee;
      }
      footer img {
        float: left;
        margin: 20px 0 0 20px;
      }
      footer p {
        font-family: "돋움";
        font-size: 12px;
        color: #666;
        margin: 40px 100px 0 0px;
        float: right;
      }
    </style>

</head>
<body>

    <header>
        <div id="logo"><img src="./img/logo.jpg" alt="랜드로버 로고"></div>
        <nav>
            <ul>
                <li><a href="#">VEHICLES</a></li>
                <li><a href="#">PRICE</a></li>
                <li><a href="#">OFFERS</a></li>
                <li><a href="#">SECONDHAND CAR</a></li>
                <li><a href="#">OWNERSHIP</a></li>
            </ul>
        </nav>
    </header>

    <div id="slider">
        <img src="./img/2.jpg" alt="메인 슬라이드 이미지">
    </div>

    <section>
        <article>
            <h3>NEWS</h3>
            <a href="#"><img src="./img/4.jpg" alt="뉴스 이미지"></a>
            <h4>Discovery 5</h4>
            <p>랜드로버가 만든 정통 SUV, 디스커버리의 신형 모델이 다음 달 공개된다.</p>
        </article>

        <article>
            <h3>랜드로버 모델 살펴보기</h3>
            <a href="#"><img src="./img/8.jpg" alt="모델 이미지"></a>
        </article>

        <article>
            <h3>고객지원</h3>
            <div class="icon">
                <a href="#"><img src="./img/icon3.jpg" alt="시승신청"></a>
                <span>시승신청</span>
            </div>
            <div class="icon">
                <a href="#"><img src="./img/icon4.jpg" alt="뉴스레터"></a>
                <span>뉴스레터 신청</span>
            </div>
            <div class="icon">
                <a href="#"><img src="./img/icon5.jpg" alt="전시장찾기"></a>
                <span>전시장 찾기</span>
            </div>
        </article>
    </section>

    <footer>
        <img class="qwe" src="./img/logo2.jpg" alt="푸터 로고">
        <p>Jaguar Land Rover Limited: Registered office: Abbey Road, Whitley, Coventry CV3 4LF. Registered in England No: 1672070</p>
    </footer>

</body>
</html>
